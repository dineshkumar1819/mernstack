name: Build & Push MERN Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

    # ----------------------------
    # 1. Checkout Repository
    # ----------------------------
    - name: Checkout Code
      uses: actions/checkout@v4


    # ----------------------------
    # 2. Setup Docker Buildx
    # ----------------------------
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3


    # ----------------------------
    # 3. Login DockerHub
    # ----------------------------
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}


    # ----------------------------
    # 4. Build & Push Backend
    # ----------------------------
    - name: Build Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/mern-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/mern-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max


    # ----------------------------
    # 5. Build & Push Frontend
    # ----------------------------
    - name: Build Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/mern-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/mern-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max